services:
  mysql:
    image: mysql:8.4
    container_name: tejidos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsegura}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tejidos}
      MYSQL_USER: ${MYSQL_USER:-tejidos}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tejidos}
    volumes:
      - tejidos_mysql:/var/lib/mysql
    # Sin publicar 3306 al host: evita choques si ya hay otro MySQL.
    # La app llega a mysql por la red interna del stack.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootsegura}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    container_name: tejidos-ollama
    restart: unless-stopped
    volumes:
      - tejidos_ollama:/root/.ollama
    # Sin publicar 11434 al host (solo red interna del stack).
    # Si quieres usarlo desde fuera: "11434:11434"

  # Baja el modelo la primera vez (llama3.2 ~2 GB). Luego puedes pararlo.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: tejidos-ollama-pull
    depends_on:
      - ollama
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 8 &&
       ollama pull ${OLLAMA_MODEL:-llama3.2}"
    environment:
      OLLAMA_HOST: http://ollama:11434

  app:
    build: .
    container_name: tejidos-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      PORT: 3001
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tejidos}
      MYSQL_USER: ${MYSQL_USER:-tejidos}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tejidos}
      APP_PASSWORD: ${APP_PASSWORD:-}
      # Deja OPENAI vacío para usar Ollama
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    volumes:
      - tejidos_uploads:/app/data/uploads
    ports:
      - "8088:3001"

volumes:
  tejidos_mysql:
  tejidos_uploads:
  tejidos_ollama:
